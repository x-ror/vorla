<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    "The Lens" — Name-agnostic concept
    An outer ring with an offset inner circle creating a crescent/eclipse effect,
    plus a small extraction notch at the bottom-right.
    Communicates: focus, precision extraction, visual media tool.
  -->
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="176" fill="none" stroke="#1A9E8F" stroke-width="48"/>
  <!-- Inner offset circle (creates eclipse/lens depth) -->
  <circle cx="232" cy="232" r="80" fill="#1A9E8F" opacity="0.2"/>
  <circle cx="232" cy="232" r="80" fill="none" stroke="#1A9E8F" stroke-width="36"/>
  <!-- Extraction notch: a short stroke breaking out of the ring at bottom-right -->
  <line x1="380" y1="340" x2="424" y2="392" stroke="#1A9E8F" stroke-width="48" stroke-linecap="round"/>
</svg>
