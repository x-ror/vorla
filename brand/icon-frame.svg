<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    "The Frame" — Name-agnostic concept
    Viewfinder crop brackets with a subtle downward capture stroke.
    Communicates: content capture, visual media, precision framing.
  -->
  <g fill="none" stroke="#1A9E8F" stroke-linecap="round" stroke-linejoin="round" stroke-width="48">
    <!-- Top-left bracket -->
    <path d="M120 200 L120 120 L200 120"/>
    <!-- Top-right bracket -->
    <path d="M312 120 L392 120 L392 200"/>
    <!-- Bottom-left bracket -->
    <path d="M120 312 L120 392 L200 392"/>
    <!-- Bottom-right bracket -->
    <path d="M312 392 L392 392 L392 312"/>
    <!-- Center capture stroke: a downward chevron -->
    <path d="M208 240 L256 296 L304 240"/>
  </g>
</svg>
