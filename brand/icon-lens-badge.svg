<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    "The Lens" Badge — App icon / Favicon
    White mark on teal rounded-square background
  -->
  <rect width="512" height="512" rx="112" ry="112" fill="#1A9E8F"/>
  <!-- Outer ring -->
  <circle cx="244" cy="244" r="148" fill="none" stroke="#FFFFFF" stroke-width="44"/>
  <!-- Inner offset circle -->
  <circle cx="222" cy="222" r="68" fill="rgba(255,255,255,0.15)"/>
  <circle cx="222" cy="222" r="68" fill="none" stroke="#FFFFFF" stroke-width="32"/>
  <!-- Extraction notch -->
  <line x1="352" y1="332" x2="392" y2="380" stroke="#FFFFFF" stroke-width="44" stroke-linecap="round"/>
</svg>
